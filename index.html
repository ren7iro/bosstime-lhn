<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Time | LHN</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #000000;
        }

        .container { 
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
        }
        
        .header-row, .row {
            display: grid;
            grid-template-columns: 1fr auto; 
            gap: 12px;
            padding: 10px 0;
            align-items: center;
        }

        .header-row {
            border-bottom: 2px solid #000;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.7rem;
            margin-bottom: 4px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }

        .row { border: none; }

        .group-separator { 
            margin: 12px 0; 
            border-top: 1px solid #eeeeee; 
            height: 0; 
        }
        
        .col-name {
            font-size: 0.8rem;
            font-weight: normal;
            line-height: 1.2;
            word-break: break-word;
        }

        .col-time { 
            text-align: right;
            font-size: 0.8rem;
            min-width: 4.2rem;
            font-weight: normal;
            color: #444;
        }

        .spawned { 
            color: #ff0000 !important; 
            font-weight: bold !important; 
        }

        .status-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 70vh;
            text-align: center;
            padding: 20px;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .retry-btn {
            margin-top: 16px;
            padding: 12px 24px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        .auto-retry-text {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #888;
        }

        .timezone-note { 
            font-size: 0.6rem; 
            color: #bbbbbb; 
            margin-bottom: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="tz-display" class="timezone-note"></div>
    <div id="main-content">
        <div class="header-row">
            <div class="col-name">boss name</div>
            <div class="col-time">next spawn</div>
        </div>
        <div id="boss-list">
            <div class="status-container">
                <div class="loader"></div>
                <div style="font-size: 0.8rem; color: #666;">please wait, i mai skil..</div>
            </div>
        </div>
    </div>
</div>

<script>
    let bossData = []; 
    let isRetrying = false;

    function getMapGroup(name) {
        const match = name.match(/^\[(\d{2})\]/);
        return match ? match[1] : "Other";
    }

    function startAutoRetry(seconds) {
        if (isRetrying) return; // Prevent multiple countdowns
        isRetrying = true;

        let timeLeft = seconds;
        const countdown = setInterval(() => {
            const timerSpan = document.getElementById('retry-timer');
            timeLeft -= 1;
            if (timerSpan) timerSpan.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                location.reload();
            }
        }, 1000);
    }

    async function fetchBossData() {
        const listDiv = document.getElementById('boss-list');
        
        try {
            const timestamp = new Date().getTime();
            const targetUrl = 'https://laghaimnew.com/MAIN_/cache/boss_spawn.json';
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}&t=${timestamp}`;

            const res = await fetch(proxyUrl, { cache: "no-store" });
            if (!res.ok) throw new Error("Connection failed");
            
            const data = await res.json();
            
            bossData = Object.values(data).sort((a, b) => {
                const groupA = getMapGroup(a.bossname);
                const groupB = getMapGroup(b.bossname);
                if (groupA !== groupB) {
                    if (groupA === "Other") return 1;
                    if (groupB === "Other") return -1;
                    return groupA.localeCompare(groupB);
                }
                return a.bossname.localeCompare(b.bossname);
            });

            renderList();

        } catch (e) {
            console.error("Fetch Error:", e);
            
            // If we have no data yet (initial load failed), show the retry UI
            if (bossData.length === 0) {
                listDiv.innerHTML = `
                    <div class="status-container">
                        <div style="color: red; font-size: 0.9rem; margin-bottom: 8px;">fail to load data</div>
                        <button class="retry-btn" onclick="location.reload()">try again</button>
                        <div class="auto-retry-text">or wait <span id="retry-timer">5</span> second..</div>
                    </div>`;
                startAutoRetry(5);
            }
        }
    }

    function renderList() {
        const container = document.getElementById('boss-list');
        const now = new Date();
        container.innerHTML = '';
        let lastGroup = "";

        document.getElementById('tz-display').textContent = "TZ: " + Intl.DateTimeFormat().resolvedOptions().timeZone;

        bossData.forEach((boss, index) => {
            const currentGroup = getMapGroup(boss.bossname);
            
            if (index > 0 && currentGroup !== lastGroup) {
                const separator = document.createElement('div');
                separator.className = 'group-separator';
                container.appendChild(separator);
            }
            lastGroup = currentGroup;

            const spawnTime = new Date(boss.bosstime + "-03:00");
            const diff = spawnTime - now;

            const row = document.createElement('div');
            row.className = 'row';

            const nameCol = document.createElement('div');
            nameCol.className = 'col-name';
            nameCol.textContent = boss.bossname;

            const timeCol = document.createElement('div');
            timeCol.className = 'col-time';

            if (diff <= 0) {
                timeCol.textContent = 'alive';
                timeCol.classList.add('spawned');
            } else {
                let hh = spawnTime.getHours() % 24;
                let mm = spawnTime.getMinutes();
                timeCol.textContent = `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
                timeCol.classList.remove('spawned');
            }

            row.appendChild(nameCol);
            row.appendChild(timeCol);
            container.appendChild(row);
        });
    }

    fetchBossData();
    setInterval(fetchBossData, 60000); // Check server every 1 min
    setInterval(renderList, 5000);    // Update "alive" status every 5 sec
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Time | LHN</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #000000;
        }

        .container { 
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
        }
        
        .header-row, .row {
            display: grid;
            grid-template-columns: 1fr auto; 
            gap: 15px;
            padding: 8px 0;
            align-items: center;
        }

        .header-row {
            border-bottom: 2px solid #000;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 5px;
        }

        .row { border: none; }

        .group-separator { 
            margin: 10px 0; 
            border-top: 1px solid #ddd; 
            height: 0; 
        }
        
        .col-name {
            font-size: 0.85rem;
            font-weight: normal;
        }

        .col-time { 
            text-align: right;
            font-size: 0.85rem;
            min-width: 4.5rem;
            font-weight: normal;
        }

        .spawned { 
            color: #ff0000 !important; 
            font-weight: bold; 
        }

        .status-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80vh;
            text-align: center;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #333;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .retry-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .timezone-note { font-size: 0.65rem; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="tz-display" class="timezone-note"></div>
    <div id="main-content">
        <div class="header-row">
            <div class="col-name">boss name</div>
            <div class="col-time">next spawn</div>
        </div>
        <div id="boss-list">
            <div class="status-container">
                <div class="loader"></div>
                <div>loading data, i mai skil..</div>
            </div>
        </div>
    </div>
</div>

<script>
    let bossData = []; // This stores our data so it stays visible

    function getMapGroup(name) {
        const match = name.match(/^\[(\d{2})\]/);
        return match ? match[1] : "Other";
    }

    async function fetchBossData() {
        const listDiv = document.getElementById('boss-list');
        
        try {
            const timestamp = new Date().getTime();
            const targetUrl = 'https://laghaimnew.com/MAIN_/cache/boss_spawn.json';
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}&t=${timestamp}`;

            const res = await fetch(proxyUrl, { cache: "no-store" });
            if (!res.ok) throw new Error("Connection failed");
            
            const data = await res.json();
            
            // Overwrite the bossData array with fresh data
            bossData = Object.values(data).sort((a, b) => {
                const groupA = getMapGroup(a.bossname);
                const groupB = getMapGroup(b.bossname);
                if (groupA !== groupB) {
                    if (groupA === "Other") return 1;
                    if (groupB === "Other") return -1;
                    return groupA.localeCompare(groupB);
                }
                return a.bossname.localeCompare(b.bossname);
            });

            // Successful fetch, show the data
            renderList();

        } catch (e) {
            console.error("Fetch Error:", e);
            
            // Only show error screen if we have NO data to display
            if (bossData.length === 0) {
                listDiv.innerHTML = `
                    <div class="status-container">
                        <div style="color: red; margin-bottom: 10px;">i mai fail load data</div>
                        <button class="retry-btn" onclick="location.reload()">refresh now</button>
                    </div>`;
            }
            // If bossData already has items, we do nothing (silent fail) 
            // and the previous list stays visible to the user.
        }
    }

    function renderList() {
        const container = document.getElementById('boss-list');
        const now = new Date();
        container.innerHTML = '';
        let lastGroup = "";

        document.getElementById('tz-display').textContent = "TZ: " + Intl.DateTimeFormat().resolvedOptions().timeZone;

        bossData.forEach((boss, index) => {
            const currentGroup = getMapGroup(boss.bossname);
            
            if (index > 0 && currentGroup !== lastGroup) {
                const separator = document.createElement('div');
                separator.className = 'group-separator';
                container.appendChild(separator);
            }
            lastGroup = currentGroup;

            const spawnTime = new Date(boss.bosstime + "-03:00");
            const diff = spawnTime - now;

            const row = document.createElement('div');
            row.className = 'row';

            const nameCol = document.createElement('div');
            nameCol.className = 'col-name';
            nameCol.textContent = boss.bossname;

            const timeCol = document.createElement('div');
            timeCol.className = 'col-time';

            if (diff <= 0) {
                timeCol.textContent = 'alive';
                timeCol.classList.add('spawned');
            } else {
                let hh = spawnTime.getHours() % 24;
                let mm = spawnTime.getMinutes();
                timeCol.textContent = `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
                timeCol.classList.remove('spawned');
            }

            row.appendChild(nameCol);
            row.appendChild(timeCol);
            container.appendChild(row);
        });
    }

    fetchBossData();
    // Re-check the server every 60 seconds
    setInterval(fetchBossData, 60000);
</script>
</body>
</html>

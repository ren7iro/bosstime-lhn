<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Time | LHN</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .header-row {
            display: grid;
            grid-template-columns: 1fr auto; 
            padding: 10px 0;
            border-bottom: 2px solid #000;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr auto; 
            padding: 12px 0;
            font-size: 0.85rem;
            align-items: center;
        }

        .group-separator { border-top: 1px solid #eee; margin: 8px 0; }

        .col-time { 
            text-align: right; 
            min-width: 5.5rem; 
            cursor: pointer; 
        }

        /* The new light background for countdown */
        .countdown-mode { 
            font-style: italic; 
            background-color: #f0f0f0; /* Light grey background */
            padding: 4px 8px;
            border-radius: 4px;
            color: #333;
            display: inline-block;
        }

        .spawned { color: #ff0000; font-weight: bold; font-style: normal; }

        .status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
            font-size: 0.8rem;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #333;
            border-radius: 50%;
            width: 24px; height: 24px;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header-row">
    <div>boss name</div>
    <div>next spawn</div>
</div>

<div id="boss-list">
    <div class="status-container">
        <div class="loader"></div>
        <div>please wait, i mai skil..</div>
    </div>
</div>

<script>
    let bossData = []; 
    let activeCountdowns = new Set(JSON.parse(localStorage.getItem('boss_prefs') || '[]'));
    let isFetching = false;

    function getMapGroup(name) {
        const match = name.match(/^\[(\d{2})\]/);
        return match ? match[1] : "Other";
    }

    async function fetchBossData() {
    if (isFetching) return; 
    isFetching = true;

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);

    try {
        // Your private Cloudflare worker link
        const proxyUrl = "https://laghaim-proxy.launkk.workers.dev";

        const res = await fetch(proxyUrl, { signal: controller.signal });
        clearTimeout(timeoutId);
        
        const data = await res.json();
        
        bossData = Object.values(data).sort((a, b) => {
            const gA = getMapGroup(a.bossname), gB = getMapGroup(b.bossname);
            return gA !== gB ? (gA === "Other" ? 1 : gB === "Other" ? -1 : gA.localeCompare(gB)) : a.bossname.localeCompare(b.bossname);
        });
        
        renderList();
        isFetching = false;
    } catch (e) {
        isFetching = false;
        console.log("Worker busy or timed out. Retrying...");
        setTimeout(fetchBossData, 2000); 
    }
}

    function toggleView(bossName) {
        activeCountdowns.has(bossName) ? activeCountdowns.delete(bossName) : activeCountdowns.add(bossName);
        localStorage.setItem('boss_prefs', JSON.stringify([...activeCountdowns]));
        renderList();
    }

    function renderList() {
        const container = document.getElementById('boss-list');
        if (!bossData.length) return;

        const now = new Date();
        const fragment = document.createDocumentFragment();
        let lastGroup = "";

        bossData.forEach((boss, index) => {
            const currentGroup = getMapGroup(boss.bossname);
            if (index > 0 && currentGroup !== lastGroup) {
                const sep = document.createElement('div');
                sep.className = 'group-separator';
                fragment.appendChild(sep);
            }
            lastGroup = currentGroup;

            const spawnTime = new Date(boss.bosstime + "-03:00");
            const diff = spawnTime - now;
            const row = document.createElement('div');
            row.className = 'row';

            const timeCol = document.createElement('div');
            timeCol.className = 'col-time';
            
            if (diff <= 0) {
                timeCol.innerHTML = `<span class="spawned">alive</span>`;
            } else {
                timeCol.onclick = () => toggleView(boss.bossname);
                if (activeCountdowns.has(boss.bossname)) {
                    const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                    const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    timeCol.innerHTML = `<span class="countdown-mode">${timeStr}</span>`;
                } else {
                    timeCol.innerHTML = `<span>${String(spawnTime.getHours() % 24).padStart(2, '0')}:${String(spawnTime.getMinutes()).padStart(2, '0')}</span>`;
                }
            }

            row.innerHTML = `<div>${boss.bossname}</div>`;
            row.appendChild(timeCol);
            fragment.appendChild(row);
        });

        container.innerHTML = '';
        container.appendChild(fragment);
    }

    fetchBossData();
    setInterval(fetchBossData, 60000); 
    setInterval(renderList, 1000);
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'visible') fetchBossData();
    });
</script>
</body>
</html>

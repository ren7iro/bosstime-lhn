<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Time | LHN</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #000000;
        }

        .container { 
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
        }
        
        .header-row, .row {
            display: grid;
            grid-template-columns: 1fr auto; 
            gap: 15px;
            padding: 8px 0;
            align-items: center;
        }

        .header-row {
            border-bottom: 2px solid #000;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 5px;
        }

        .row { border: none; }

        .group-separator { 
            margin: 10px 0; 
            border-top: 1px solid #ddd; 
            height: 0; 
        }
        
        .col-name {
            font-size: 0.85rem;
            font-weight: normal;
        }

        .col-time { 
            text-align: right;
            font-size: 0.85rem;
            min-width: 6.5rem; /* Wider to accommodate (i) and countdown */
            font-weight: normal;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
        }

        /* Container for the sliding text */
        .time-wrapper {
            display: inline-flex;
            transition: transform 0.3s ease-in-out;
            align-items: center;
        }

        /* The (i) button style */
        .info-btn {
            font-size: 0.7rem;
            color: #007bff;
            margin-left: 6px;
            cursor: pointer;
            font-style: italic;
            border: 1px solid #007bff;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .spawned { 
            color: #ff0000 !important; 
            font-weight: bold; 
        }

        .status-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80vh;
            text-align: center;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #333;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .retry-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .timezone-note { font-size: 0.65rem; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="tz-display" class="timezone-note"></div>
    <div id="main-content">
        <div class="header-row">
            <div class="col-name">boss name</div>
            <div class="col-time">next spawn</div>
        </div>
        <div id="boss-list">
            <div class="status-container">
                <div class="loader"></div>
                <div>please wait, i mai skil..</div>
            </div>
        </div>
    </div>
</div>

<script>
    let bossData = []; 
    let activeCountdowns = new Set(); // Tracks which bosses are showing countdown

    function getMapGroup(name) {
        const match = name.match(/^\[(\d{2})\]/);
        return match ? match[1] : "Other";
    }

    async function fetchBossData() {
        try {
            const timestamp = new Date().getTime();
            const targetUrl = 'https://laghaimnew.com/MAIN_/cache/boss_spawn.json';
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}&t=${timestamp}`;

            const res = await fetch(proxyUrl, { cache: "no-store" });
            if (!res.ok) throw new Error("Connection failed");
            const data = await res.json();
            
            bossData = Object.values(data).sort((a, b) => {
                const groupA = getMapGroup(a.bossname);
                const groupB = getMapGroup(b.bossname);
                if (groupA !== groupB) {
                    if (groupA === "Other") return 1;
                    if (groupB === "Other") return -1;
                    return groupA.localeCompare(groupB);
                }
                return a.bossname.localeCompare(b.bossname);
            });
            renderList();
        } catch (e) {
            if (bossData.length === 0) {
                document.getElementById('boss-list').innerHTML = `
                    <div class="status-container">
                        <div style="color: red; margin-bottom: 10px;">fail to load data</div>
                        <button class="retry-btn" onclick="location.reload()">try again</button>
                    </div>`;
            }
        }
    }

    function toggleView(bossName) {
        if (activeCountdowns.has(bossName)) {
            activeCountdowns.delete(bossName);
        } else {
            activeCountdowns.add(bossName);
        }
        renderList();
    }

    function renderList() {
        const container = document.getElementById('boss-list');
        const now = new Date();
        container.innerHTML = '';
        let lastGroup = "";

        document.getElementById('tz-display').textContent = "TZ: " + Intl.DateTimeFormat().resolvedOptions().timeZone;

        bossData.forEach((boss, index) => {
            const currentGroup = getMapGroup(boss.bossname);
            if (index > 0 && currentGroup !== lastGroup) {
                const separator = document.createElement('div');
                separator.className = 'group-separator';
                container.appendChild(separator);
            }
            lastGroup = currentGroup;

            const spawnTime = new Date(boss.bosstime + "-03:00");
            const diff = spawnTime - now;

            const row = document.createElement('div');
            row.className = 'row';

            const nameCol = document.createElement('div');
            nameCol.className = 'col-name';
            nameCol.textContent = boss.bossname;

            const timeCol = document.createElement('div');
            timeCol.className = 'col-time';

            if (diff <= 0) {
                timeCol.innerHTML = `<span class="spawned">alive</span>`;
            } else {
                if (activeCountdowns.has(boss.bossname)) {
                    // Show Countdown
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    const cdText = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                    
                    timeCol.innerHTML = `<div onclick="toggleView('${boss.bossname}')">${cdText} <span class="info-btn">i</span></div>`;
                } else {
                    // Show Static Time
                    let hh = String(spawnTime.getHours() % 24).padStart(2, '0');
                    let mm = String(spawnTime.getMinutes()).padStart(2, '0');
                    
                    timeCol.innerHTML = `<div onclick="toggleView('${boss.bossname}')">${hh}:${mm} <span class="info-btn">i</span></div>`;
                }
            }

            row.appendChild(nameCol);
            row.appendChild(timeCol);
            container.appendChild(row);
        });
    }

    fetchBossData();
    setInterval(fetchBossData, 60000);
    setInterval(renderList, 1000); // 1s refresh to keep countdown smooth
</script>
</body>
</html>

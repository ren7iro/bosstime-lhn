<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Time | LHN</title>
    <style>
        /* 1. Plain Layout */
        html, body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 16px;
            color: #000000;
        }

        .container {
            width: 100%;
        }

        /* 2. Plain Header (No Style) */
        .header-row {
            display: grid;
            grid-template-columns: 1fr auto;
            padding: 5px 0;
            border-bottom: 1px solid #000;
            margin-bottom: 10px;
        }

        /* 3. Plain Rows (No Bold, No Hover Background) */
        .row {
            display: grid;
            grid-template-columns: 1fr auto;
            padding: 4px 0;
            border-bottom: 1px solid #eee;
        }

        .col-name, .col-time {
            font-weight: normal; /* Removes Bold */
        }

        .col-time {
            text-align: right;
        }

        /* 4. No Animation for Alive Status */
        .spawned {
            color: #000000; /* Standard Black */
        }

        .loading-msg, .error-msg {
            padding: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <div class="col-name">Boss Name</div>
        <div class="col-time">Next Spawn</div>
    </div>
    <div id="boss-list">
        <div class="loading-msg">Loading boss data, i mai skil..</div>
    </div>
</div>

<script>
    async function fetchBossData() {
        const container = document.getElementById('boss-list');
        
        try {
            const timestamp = new Date().getTime();
            const targetUrl = 'https://laghaimnew.com/MAIN_/cache/boss_spawn.json';
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}&t=${timestamp}`;

            const res = await fetch(proxyUrl, { cache: "no-store" });
            if (!res.ok) throw new Error('Offline');
            
            const data = await res.json();
            const bosses = Object.values(data).sort((a, b) => new Date(a.bosstime) - new Date(b.bosstime));
            
            container.innerHTML = '';

            bosses.forEach(boss => {
                const row = document.createElement('div');
                row.className = 'row';

                const name = document.createElement('div');
                name.className = 'col-name';
                name.textContent = boss.bossname || 'Unknown';

                const time = document.createElement('div');
                time.className = 'col-time';
                
                const spawnTime = new Date(boss.bosstime);
                spawnTime.setHours(spawnTime.getHours() + 10); 
                const now = new Date();

                if (spawnTime <= now) {
                    time.textContent = 'alive';
                    time.className = 'col-time spawned';
                } else {
                    let hh = spawnTime.getHours() % 24;
                    let mm = spawnTime.getMinutes();
                    const timeStr = `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
                    time.textContent = timeStr;
                }

                row.appendChild(name);
                row.appendChild(time);
                container.appendChild(row);
            });

        } catch (error) {
            console.error('Fetch Error:', error);
            if (container.innerHTML.includes('Loading')) {
                container.innerHTML = `<div>Failed to load, Retrying..</div>`;
            }
        }
    }

    fetchBossData();
    setInterval(fetchBossData, 5000);
</script>

</body>
</html>

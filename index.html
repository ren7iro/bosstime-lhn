<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Time | LHN</title>
    <style>
        html, body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 16px;
            color: #000000;
        }

        .container {
            width: 100%;
        }

        .header-row {
            display: grid;
            grid-template-columns: 1fr auto;
            padding: 5px 0;
            border-bottom: 1px solid #000;
            margin-bottom: 10px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr auto;
            padding: 4px 0;
            border-bottom: 1px solid #eee;
        }

        /* Adds a gap between different map groups */
        .group-separator {
            height: 20px;
            border: none;
        }

        .col-name, .col-time {
            font-weight: normal;
        }

        .col-time {
            text-align: right;
        }

        .spawned {
            color: #000000;
        }

        .loading-msg, .error-msg {
            padding: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <div class="col-name">Boss Name</div>
        <div class="col-time">Next Spawn</div>
    </div>
    <div id="boss-list">
        <div class="loading-msg">Loading...</div>
    </div>
</div>

<script>
    // Helper to extract the map prefix, e.g., "[23][610]" or "Shilon"
    function getMapPrefix(name) {
        const match = name.match(/^(\[[^\]]+\]\[[^\]]+\]|\[[^\]]+\]|[A-Za-z]+\s*:\s*|[A-Za-z]+\s*-\s*)/);
        return match ? match[0] : "Other";
    }

    async function fetchBossData() {
        const container = document.getElementById('boss-list');
        
        try {
            const timestamp = new Date().getTime();
            const targetUrl = 'https://laghaimnew.com/MAIN_/cache/boss_spawn.json';
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}&t=${timestamp}`;

            const res = await fetch(proxyUrl, { cache: "no-store" });
            if (!res.ok) throw new Error('Offline');
            
            const data = await res.json();
            
            // Sort by Map Prefix first, then by Name
            const bosses = Object.values(data).sort((a, b) => {
                const prefixA = getMapPrefix(a.bossname);
                const prefixB = getMapPrefix(b.bossname);
                if (prefixA !== prefixB) return prefixA.localeCompare(prefixB);
                return a.bossname.localeCompare(b.bossname);
            });
            
            container.innerHTML = '';
            let lastPrefix = "";

            bosses.forEach((boss, index) => {
                const currentPrefix = getMapPrefix(boss.bossname);

                // Add space between different map groups
                if (index > 0 && currentPrefix !== lastPrefix) {
                    const spacer = document.createElement('div');
                    spacer.className = 'group-separator';
                    container.appendChild(spacer);
                }
                lastPrefix = currentPrefix;

                const row = document.createElement('div');
                row.className = 'row';

                const nameCol = document.createElement('div');
                nameCol.className = 'col-name';
                nameCol.textContent = boss.bossname || 'Unknown';

                const timeCol = document.createElement('div');
                timeCol.className = 'col-time';
                
                const spawnTime = new Date(boss.bosstime);
                spawnTime.setHours(spawnTime.getHours() + 10); 
                const now = new Date();

                if (spawnTime <= now) {
                    timeCol.textContent = 'alive';
                    timeCol.className = 'col-time spawned';
                } else {
                    let hh = spawnTime.getHours() % 24;
                    let mm = spawnTime.getMinutes();
                    const timeStr = `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
                    timeCol.textContent = timeStr;
                }

                row.appendChild(nameCol);
                row.appendChild(timeCol);
                container.appendChild(row);
            });

        } catch (error) {
            console.error('Fetch Error:', error);
            if (container.innerHTML.includes('Loading')) {
                container.innerHTML = `<div>Connect error. Retrying...</div>`;
            }
        }
    }

    fetchBossData();
    setInterval(fetchBossData, 10000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Time | LHN</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #000000;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
        }
        
        .header-row {
            display: grid;
            grid-template-columns: 1fr auto; 
            gap: 15px;
            padding: 10px 0;
            align-items: center;
            border-bottom: 2px solid #000;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr auto; 
            gap: 15px;
            padding: 10px 0;
            align-items: center;
        }

        .group-separator { 
            margin: 10px 0; 
            border-top: 1px solid #eee; 
            height: 0; 
        }
        
        .col-name { font-size: 0.85rem; }

        .col-time { 
            text-align: right;
            font-size: 0.85rem;
            min-width: 5.5rem;
            cursor: pointer;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .countdown-mode { font-style: italic; color: #333; }
        .spawned { color: #ff0000 !important; font-weight: bold; font-style: normal !important; }

        .status-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 70vh;
            text-align: center;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #333;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .retry-btn {
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .footer-note {
            font-size: 0.6rem;
            color: #bbb;
            text-align: center;
            margin-top: 20px;
            padding-bottom: 20px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="tz-display" style="font-size: 0.65rem; color: #aaa; margin-bottom: 5px;"></div>
    <div class="header-row">
        <div class="col-name">boss name</div>
        <div class="col-time">next spawn</div>
    </div>
    <div id="boss-list">
        <div class="status-container">
            <div class="loader"></div>
            <div style="margin-top:15px; font-size: 0.8rem;">please wait, i mai skil..</div>
        </div>
    </div>
    <div id="update-time" class="footer-note"></div>
</div>

<script>
    let bossData = []; 
    let activeCountdowns = new Set(JSON.parse(localStorage.getItem('boss_prefs') || '[]'));

    function getMapGroup(name) {
        const match = name.match(/^\[(\d{2})\]/);
        return match ? match[1] : "Other";
    }

    async function fetchBossData() {
        try {
            const timestamp = new Date().getTime();
            const targetUrl = 'https://laghaimnew.com/MAIN_/cache/boss_spawn.json';
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}&t=${timestamp}`;

            const res = await fetch(proxyUrl, { cache: "no-store" });
            if (!res.ok) throw new Error("Network response was not ok");
            
            const data = await res.json();
            
            bossData = Object.values(data).sort((a, b) => {
                const gA = getMapGroup(a.bossname), gB = getMapGroup(b.bossname);
                return gA !== gB ? (gA === "Other" ? 1 : gB === "Other" ? -1 : gA.localeCompare(gB)) : a.bossname.localeCompare(b.bossname);
            });
            
            document.getElementById('update-time').textContent = "Last Data Update: " + new Date().toLocaleTimeString();
            renderList();
        } catch (e) { 
            console.error("Update failed:", e);
            if (bossData.length === 0) {
                document.getElementById('boss-list').innerHTML = `
                    <div class="status-container">
                        <div style="color: red; margin-bottom: 10px; font-size: 0.9rem;">fail to load data</div>
                        <button class="retry-btn" onclick="location.reload()">try again</button>
                    </div>`;
            }
            document.getElementById('update-time').textContent = "Update Failed - Check Connection";
        }
    }

    function toggleView(bossName) {
        if (activeCountdowns.has(bossName)) activeCountdowns.delete(bossName);
        else activeCountdowns.add(bossName);
        localStorage.setItem('boss_prefs', JSON.stringify([...activeCountdowns]));
        renderList();
    }

    function renderList() {
        const container = document.getElementById('boss-list');
        if (!bossData.length) return;

        const now = new Date();
        const fragment = document.createDocumentFragment();
        let lastGroup = "";

        document.getElementById('tz-display').textContent = "Device TZ: " + Intl.DateTimeFormat().resolvedOptions().timeZone;

        bossData.forEach((boss, index) => {
            const currentGroup = getMapGroup(boss.bossname);
            if (index > 0 && currentGroup !== lastGroup) {
                const sep = document.createElement('div');
                sep.className = 'group-separator';
                fragment.appendChild(sep);
            }
            lastGroup = currentGroup;

            const spawnTime = new Date(boss.bosstime + "-03:00");
            const diff = spawnTime - now;

            const row = document.createElement('div');
            row.className = 'row';

            const nameCol = document.createElement('div');
            nameCol.className = 'col-name';
            nameCol.textContent = boss.bossname;

            const timeCol = document.createElement('div');
            timeCol.className = 'col-time';
            
            if (diff <= 0) {
                timeCol.innerHTML = `<span class="spawned">alive</span>`;
            } else {
                timeCol.onclick = () => toggleView(boss.bossname);
                
                if (activeCountdowns.has(boss.bossname)) {
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    const cdText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    timeCol.innerHTML = `<span class="countdown-mode">${cdText}</span>`;
                } else {
                    const hh = String(spawnTime.getHours() % 24).padStart(2, '0');
                    const mm = String(spawnTime.getMinutes()).padStart(2, '0');
                    timeCol.innerHTML = `<span>${hh}:${mm}</span>`;
                }
            }

            row.appendChild(nameCol);
            row.appendChild(timeCol);
            fragment.appendChild(row);
        });

        container.innerHTML = '';
        container.appendChild(fragment);
    }

    fetchBossData();
    setInterval(fetchBossData, 60000); 
    setInterval(renderList, 1000);    
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Time | LHN</title>
    <style>
        /* Device-handled font scaling */
        html, body {
            margin: 0;
            padding: 1rem;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #000000;
            line-height: 1.4;
        }

        .container { 
            width: 100%; 
            margin: 0;
        }
        
        /* Layout Grid */
        .header-row, .row {
            display: grid;
            grid-template-columns: 1fr auto auto; 
            gap: 1rem;
            padding: 0.4rem 0;
            align-items: center;
        }

        .header-row {
            border-bottom: 2px solid #000;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        /* Removed border-bottom from rows to keep it clean */
        .row {
            border: none; 
        }

        /* Keep line between groups only */
        .group-separator { 
            margin: 1rem 0; 
            border-top: 1px solid #ccc; 
            height: 0; 
        }
        
        .col-name {
            word-break: break-word;
        }

        .col-time { 
            color: #7f8c8d; 
            font-size: 0.85rem;
            min-width: 3.5rem;
            text-align: right;
        }

        .col-countdown { 
            font-size: 0.85rem;
            min-width: 5.5rem;
            text-align: right;
        }

        .spawned { 
            color: #ff0000 !important; 
            font-weight: bold; 
        }

        .timezone-note { 
            font-size: 0.7rem; 
            color: #999; 
            margin-bottom: 0.5rem; 
        }

        /* Mobile specific optimization */
        @media screen and (max-width: 400px) {
            html, body { padding: 0.5rem; }
            .header-row, .row { gap: 0.5rem; }
            .col-countdown { min-width: 4.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="tz-display" class="timezone-note"></div>
    <div class="header-row">
        <div class="col-name">BOSS TIME | LHN</div>
        <div class="col-time">TIME</div>
        <div class="col-countdown">COUNTDOWN</div>
    </div>
    <div id="boss-list">
        <div>Loading tracker...</div>
    </div>
</div>

<script>
    let bossData = [];

    function getMapGroup(name) {
        const match = name.match(/^\[(\d{2})\]/);
        return match ? match[1] : "Other";
    }

    async function fetchBossData() {
        try {
            const timestamp = new Date().getTime();
            const targetUrl = 'https://laghaimnew.com/MAIN_/cache/boss_spawn.json';
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}&t=${timestamp}`;

            const res = await fetch(proxyUrl, { cache: "no-store" });
            const data = await res.json();
            
            bossData = Object.values(data).sort((a, b) => {
                const groupA = getMapGroup(a.bossname);
                const groupB = getMapGroup(b.bossname);
                if (groupA !== groupB) {
                    if (groupA === "Other") return 1;
                    if (groupB === "Other") return -1;
                    return groupA.localeCompare(groupB);
                }
                return a.bossname.localeCompare(b.bossname);
            });
            renderList();
        } catch (e) { console.error("Fetch error:", e); }
    }

    function renderList() {
        const container = document.getElementById('boss-list');
        const now = new Date();
        container.innerHTML = '';
        let lastGroup = "";

        document.getElementById('tz-display').textContent = "TZ: " + Intl.DateTimeFormat().resolvedOptions().timeZone;

        bossData.forEach((boss, index) => {
            const currentGroup = getMapGroup(boss.bossname);
            
            // Separator only between groups
            if (index > 0 && currentGroup !== lastGroup) {
                const separator = document.createElement('div');
                separator.className = 'group-separator';
                container.appendChild(separator);
            }
            lastGroup = currentGroup;

            // Server GMT-3 calculation
            const spawnTime = new Date(boss.bosstime + "-03:00");
            const diff = spawnTime - now;

            const row = document.createElement('div');
            row.className = 'row';

            const nameCol = document.createElement('div');
            nameCol.className = 'col-name';
            nameCol.textContent = boss.bossname;

            const timeCol = document.createElement('div');
            timeCol.className = 'col-time';
            let hh = spawnTime.getHours() % 24;
            let mm = spawnTime.getMinutes();
            timeCol.textContent = `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;

            const countCol = document.createElement('div');
            countCol.className = 'col-countdown';

            if (diff <= 0) {
                countCol.textContent = 'alive';
                countCol.classList.add('spawned');
            } else {
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                countCol.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            row.appendChild(nameCol);
            row.appendChild(timeCol);
            row.appendChild(countCol);
            container.appendChild(row);
        });
    }

    fetchBossData();
    setInterval(fetchBossData, 30000); // Server check
    setInterval(renderList, 1000);    // Live countdown update
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Time | LHN Live</title>
    <style>
        html, body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 16px;
            color: #000000;
        }
        .container { width: 100%; }
        .header-row {
            display: grid;
            grid-template-columns: 1fr auto auto; /* Added extra column for countdown */
            padding: 10px 0;
            border-bottom: 2px solid #000;
            margin-bottom: 10px;
        }
        .row { 
            display: grid; 
            grid-template-columns: 1fr auto auto; 
            padding: 4px 0; 
            align-items: center;
        }
        .group-separator { margin: 15px 0; border-top: 1px solid #ccc; height: 0; }
        .col-time { text-align: right; width: 80px; padding-right: 20px; color: #7f8c8d; font-size: 0.9em; }
        .col-countdown { text-align: right; width: 100px; font-family: monospace; font-size: 1.1em; }
        .spawned { color: #ff0000; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <div class="col-name">Boss Name</div>
        <div class="col-time">Time</div>
        <div class="col-countdown">Countdown</div>
    </div>
    <div id="boss-list">
        <div>Synchronizing clock...</div>
    </div>
</div>

<script>
    let bossData = [];

    function getMapGroup(name) {
        const match = name.match(/^\[(\d{2})\]/);
        return match ? match[1] : "Other";
    }

    async function fetchBossData() {
        try {
            const timestamp = new Date().getTime();
            const targetUrl = 'https://laghaimnew.com/MAIN_/cache/boss_spawn.json';
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}&t=${timestamp}`;

            const res = await fetch(proxyUrl, { cache: "no-store" });
            const data = await res.json();
            
            // Treat server times as UTC and sort
            bossData = Object.values(data).sort((a, b) => {
                const groupA = getMapGroup(a.bossname);
                const groupB = getMapGroup(b.bossname);
                if (groupA !== groupB) return groupA.localeCompare(groupB);
                return new Date(a.bosstime + " UTC") - new Date(b.bosstime + " UTC");
            });
            
            renderList();
        } catch (e) { console.error("Fetch error:", e); }
    }

    function renderList() {
        const container = document.getElementById('boss-list');
        const now = new Date();
        container.innerHTML = '';
        let lastGroup = "";

        bossData.forEach((boss, index) => {
            const currentGroup = getMapGroup(boss.bossname);
            if (index > 0 && currentGroup !== lastGroup) {
                const separator = document.createElement('div');
                separator.className = 'group-separator';
                container.appendChild(separator);
            }
            lastGroup = currentGroup;

            const spawnTime = new Date(boss.bosstime + " UTC");
            const diff = spawnTime - now;

            const row = document.createElement('div');
            row.className = 'row';

            // 1. Name
            const nameCol = document.createElement('div');
            nameCol.textContent = boss.bossname;

            // 2. Static Time (Local)
            const timeCol = document.createElement('div');
            timeCol.className = 'col-time';
            timeCol.textContent = spawnTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

            // 3. Live Countdown
            const countCol = document.createElement('div');
            countCol.className = 'col-countdown';

            if (diff <= 0) {
                countCol.textContent = 'alive';
                countCol.classList.add('spawned');
            } else {
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                countCol.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            row.appendChild(nameCol);
            row.appendChild(timeCol);
            row.appendChild(countCol);
            container.appendChild(row);
        });
    }

    // Fetch new data from server every 30 seconds
    fetchBossData();
    setInterval(fetchBossData, 30000);

    // Update the countdown display every 1 second
    setInterval(renderList, 1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Time | LHN</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-color: #fff;
        }

        .header-row {
            display: grid;
            grid-template-columns: 1fr auto; 
            padding: 10px 0;
            border-bottom: 2px solid #000;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr auto; 
            padding: 12px 0;
            font-size: 0.85rem;
            align-items: center;
        }

        .group-separator { 
            border-top: 1px solid #eee; 
            margin: 8px 0; 
        }

        .boss-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .boss-name {
            font-weight: 500;
        }

        .boss-meta {
            font-size: 0.72rem;
            color: #666;
            text-transform: uppercase;
        }

        .col-time { 
            text-align: right; 
            min-width: 105px; 
            display: flex;
            justify-content: flex-end;
            align-items: center;
            cursor: pointer; 
        }

        .countdown-mode { 
            font-family: "Courier New", Courier, monospace;
            font-weight: bold;
            font-style: italic; 
            background-color: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            color: #333;
            display: inline-block;
            font-size: 0.85rem;
            letter-spacing: -0.5px;
        }

        .spawned-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
        }

        .spawned { 
            color: #ff0000; 
            font-weight: bold; 
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .spawned-ago {
            font-size: 0.68rem;
            color: #008000;
            font-weight: 500;
        }

        .status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
            font-size: 0.8rem;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #333;
            border-radius: 50%;
            width: 24px; height: 24px;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header-row">
    <div>boss name</div>
    <div>spawn time / status</div>
</div>

<div id="boss-list">
    <div class="status-container">
        <div class="loader"></div>
        <div>loading live dataset...</div>
    </div>
</div>

<script>
    // Configured directly to your live Cloudflare proxy
    const CLOUDFLARE_WORKER_URL = "https://laghaim-proxy.launkk.workers.dev";

    let bossData = []; 
    let activeCountdowns = new Set(); 
    let isFetching = false;

    function getMapGroup(name) {
        const match = name.match(/^\[(\d{2})\]/);
        return match ? match[1] : "Other";
    }

    // Helper to turn absolute milliseconds into a readable hh:mm:ss string
    function formatDuration(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    async function fetchBossData() {
        if (isFetching) return; 
        isFetching = true;

        try {
            const res = await fetch(`${CLOUDFLARE_WORKER_URL}?t=${Date.now()}`);
            if (!res.ok) throw new Error('Worker response rejection');
            
            const data = await res.json();
            
            bossData = Object.values(data).sort((a, b) => {
                const gA = getMapGroup(a.bossname), gB = getMapGroup(b.bossname);
                return gA !== gB ? (gA === "Other" ? 1 : gB === "Other" ? -1 : gA.localeCompare(gB)) : a.bossname.localeCompare(b.bossname);
            });
            
            renderList();
            isFetching = false;
        } catch (e) {
            isFetching = false;
            console.error("Sync interface error, retrying...", e);
            setTimeout(fetchBossData, 5000); 
        }
    }

    function toggleView(bossName) {
        if (activeCountdowns.has(bossName)) {
            activeCountdowns.delete(bossName);
        } else {
            activeCountdowns.add(bossName);
        }
        renderList();
    }

    function renderList() {
        const container = document.getElementById('boss-list');
        if (!bossData.length) return;

        const now = new Date();
        const fragment = document.createDocumentFragment();
        let lastGroup = "";

        bossData.forEach((boss, index) => {
            const currentGroup = getMapGroup(boss.bossname);
            if (index > 0 && currentGroup !== lastGroup) {
                const sep = document.createElement('div');
                sep.className = 'group-separator';
                fragment.appendChild(sep);
            }
            lastGroup = currentGroup;

            // Handle server time zones cleanly (Server outputs in UTC-3 structure)
            const targetTime = new Date(boss.bosstime + "-03:00");
            const diff = targetTime - now;

            const row = document.createElement('div');
            row.className = 'row';

            // Left Side text formatting
            const infoCol = document.createElement('div');
            infoCol.className = 'boss-info';
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'boss-name';
            nameDiv.textContent = boss.bossname;
            infoCol.appendChild(nameDiv);

            const metaDiv = document.createElement('div');
            metaDiv.className = 'boss-meta';
            
            const formattedTimeStr = `${String(targetTime.getHours()).padStart(2, '0')}:${String(targetTime.getMinutes()).padStart(2, '0')}`;
            
            if (diff <= 0) {
                metaDiv.textContent = `Born At: ${formattedTimeStr}`;
            } else {
                metaDiv.textContent = `Estimated: ${formattedTimeStr}`;
            }
            infoCol.appendChild(metaDiv);

            // Right Side timer formatting
            const timeCol = document.createElement('div');
            timeCol.className = 'col-time';
            
            if (diff <= 0) {
                const elapsedMs = Math.abs(diff);
                timeCol.innerHTML = `
                    <div class="spawned-container">
                        <span class="spawned">ALIVE</span>
                        <span class="spawned-ago">Born ${formatDuration(elapsedMs)} ago</span>
                    </div>
                `;
            } else {
                timeCol.onclick = () => toggleView(boss.bossname);
                if (activeCountdowns.has(boss.bossname)) {
                    timeCol.innerHTML = `<span class="countdown-mode">${formatDuration(diff)}</span>`;
                } else {
                    timeCol.innerHTML = `<span>${formattedTimeStr}</span>`;
                }
            }

            row.appendChild(infoCol);
            row.appendChild(timeCol);
            fragment.appendChild(row);
        });

        container.innerHTML = '';
        container.appendChild(fragment);
    }

    fetchBossData();
    setInterval(fetchBossData, 30000); 
    setInterval(renderList, 1000);

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'visible') fetchBossData();
    });
</script>
</body>
</html>

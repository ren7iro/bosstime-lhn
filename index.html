<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Time | LHN</title>
    <style>
        /* 1. Make the body fill the entire screen */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden; /* Prevent horizontal scrolling */
        }

        /* 2. Remove max-width so it expands to the edges */
        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 3. Adjust Header to span full width */
        .header-row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 15px 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* 4. Adjust Rows for full-screen readability */
        .row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 12px 30px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .row:hover {
            background-color: #f9f9f9;
        }

        .col-name {
            font-size: 1.1em;
            word-break: break-word;
            font-weight: 500;
        }

        .col-time {
            text-align: right;
            white-space: nowrap;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.2em;
        }

        .spawned {
            color: #27ae60;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .loading-msg, .error-msg {
            padding: 50px;
            text-align: center;
            font-size: 1.2em;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <div class="col-name">Boss Name</div>
        <div class="col-time">Next Spawn</div>
    </div>
    <div id="boss-list">
        <div class="loading-msg">Loading boss data, i mai skil..</div>
    </div>
</div>

<script>
    async function fetchBossData() {
        const container = document.getElementById('boss-list');
        
        try {
            const timestamp = new Date().getTime();
            const targetUrl = 'https://laghaimnew.com/MAIN_/cache/boss_spawn.json';
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}&t=${timestamp}`;

            const res = await fetch(proxyUrl, { cache: "no-store" });
            if (!res.ok) throw new Error('Proxy unreachable');
            
            const data = await res.json();
            const bosses = Object.values(data).sort((a, b) => new Date(a.bosstime) - new Date(b.bosstime));
            
            container.innerHTML = '';

            bosses.forEach(boss => {
                const row = document.createElement('div');
                row.className = 'row';

                const name = document.createElement('div');
                name.className = 'col-name';
                name.textContent = boss.bossname || 'Unknown Boss';

                const time = document.createElement('div');
                time.className = 'col-time';
                
                const spawnTime = new Date(boss.bosstime);
                spawnTime.setHours(spawnTime.getHours() + 10); 
                const now = new Date();

                if (spawnTime <= now) {
                    time.textContent = 'alive';
                    time.classList.add('spawned');
                } else {
    // 1. Get the adjusted hours and minutes
    let hh = spawnTime.getHours();
    let mm = spawnTime.getMinutes();

    // 2. The % 24 ensures that 24 becomes 00, 25 becomes 01, etc.
    hh = hh % 24;

    // 3. Format to 2-digits (adds a leading zero if needed)
    const timeStr = `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
    
    time.textContent = timeStr;
}

                row.appendChild(name);
                row.appendChild(time);
                container.appendChild(row);
            });

        } catch (error) {
            console.error('Fetch Error:', error);
            if (container.innerHTML.includes('Loading')) {
    container.innerHTML = `<div class="error-msg">Failed to connect. Retrying...</div>`;
}
        }
    }

    fetchBossData();
    setInterval(fetchBossData, 10000);
</script>

</body>
</html>
